<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Rewards Search Automator</title>

    <link rel="stylesheet" href="popup.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="app-container">
      <header>
        <div id="status-indicator" class="status-dot ready"></div>
        <h1>Search Automator</h1>
      </header>

      <main>
        <!-- LV1 -->

        <section class="module">
          <div class="module-header">
            <span class="lvl">LV1</span>
            <h2>Search Web</h2>
          </div>

          <div class="input-grid">
            <div class="field">
              <label>Web</label>
              <input type="number" id="web1" value="30" />
            </div>

            <div class="field">
              <label>Mobile</label>
              <input type="number" id="mobile1" value="0" />
            </div>
          </div>

          <div class="field full">
            <label>Delay: <span id="delay1-val">10</span>s</label>
            <input type="range" id="delay1" min="10" max="30" value="10" />
          </div>

          <div class="progress-box">
            <div class="progress-bar">
              <div id="progress1-bar" class="fill"></div>
            </div>
            <span id="progress1-text">0%</span>
          </div>

          <div class="actions">
            <button class="primary" id="start1">Iniciar</button>

            <button class="icon-btn" id="pause" title="Pausar">
              <svg viewBox="0 0 24 24">
                <rect x="6" y="4" width="4" height="16" />
                <rect x="14" y="4" width="4" height="16" />
              </svg>
            </button>

            <button class="icon-btn" id="resume" title="Continuar">
              <svg viewBox="0 0 24 24">
                <polygon points="5,3 19,12 5,21" />
              </svg>
            </button>

            <button class="icon-btn danger" id="cancel" title="Cancelar">
              <svg viewBox="0 0 24 24">
                <line x1="5" y1="5" x2="19" y2="19" />
                <line x1="19" y1="5" x2="5" y2="19" />
              </svg>
            </button>
          </div>
        </section>

        <!-- LV2 -->

        <section class="module">
          <div class="module-header">
            <span class="lvl">LV2</span>
            <h2>Search Web + Mobile</h2>
          </div>

          <div class="input-grid">
            <div class="field">
              <label>Web</label>
              <input type="number" id="web2" value="30" />
            </div>

            <div class="field">
              <label>Mobile</label>
              <input type="number" id="mobile2" value="20" />
            </div>
          </div>

          <div class="field full">
            <label>Delay: <span id="delay2-val">10</span>s</label>
            <input type="range" id="delay2" min="10" max="30" value="10" />
          </div>

          <div class="progress-box">
            <div class="progress-bar">
              <div id="progress2-bar" class="fill"></div>
            </div>
            <span id="progress2-text">0%</span>
          </div>

          <div class="actions">
            <button class="primary" id="start2">Iniciar Bing</button>

            <button class="icon-btn" id="pause2" title="Pausar">
              <svg viewBox="0 0 24 24">
                <rect x="6" y="4" width="4" height="16" />
                <rect x="14" y="4" width="4" height="16" />
              </svg>
            </button>

            <button class="icon-btn" id="resume2" title="Continuar">
              <svg viewBox="0 0 24 24">
                <polygon points="5,3 19,12 5,21" />
              </svg>
            </button>

            <button class="icon-btn danger" id="cancel2" title="Cancelar">
              <svg viewBox="0 0 24 24">
                <line x1="5" y1="5" x2="19" y2="19" />
                <line x1="19" y1="5" x2="5" y2="19" />
              </svg>
            </button>
          </div>
        </section>

        <!-- MOBILE -->

        <section class="module mobile-only">
          <div class="module-header">
            <span class="lvl">MO</span>
            <h2>Search Mobile</h2>
          </div>

          <div class="field full">
            <label>Quantidade Mobile</label>
            <input type="number" id="mobile3" value="20" />
          </div>

          <div class="field full">
            <label>Delay: <span id="delay3-val">10</span>s</label>
            <input type="range" id="delay3" min="10" max="30" value="10" />
          </div>

          <div class="progress-box">
            <div class="progress-bar">
              <div id="progress3-bar" class="fill"></div>
            </div>
            <span id="progress3-text">0%</span>
          </div>

          <div class="actions">
            <button class="primary" id="start3">Iniciar Mobile</button>

            <button class="icon-btn" id="pause3" title="Pausar">
              <svg viewBox="0 0 24 24">
                <rect x="6" y="4" width="4" height="16" />
                <rect x="14" y="4" width="4" height="16" />
              </svg>
            </button>

            <button class="icon-btn" id="resume3" title="Continuar">
              <svg viewBox="0 0 24 24">
                <polygon points="5,3 19,12 5,21" />
              </svg>
            </button>

            <button class="icon-btn danger" id="cancel3" title="Cancelar">
              <svg viewBox="0 0 24 24">
                <line x1="5" y1="5" x2="19" y2="19" />
                <line x1="19" y1="5" x2="5" y2="19" />
              </svg>
            </button>
          </div>
        </section>
      </main>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
